<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1a1a1a"/>
  <!-- Amber glow behind robot -->
  <rect width="64" height="64" rx="14" fill="url(#glow)" opacity="0.18"/>

  <!-- Robot icon (based on Lucide Bot, scaled and centered) -->
  <!-- Head -->
  <rect x="16" y="22" width="32" height="24" rx="5" stroke="#F5A623" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Antenna -->
  <line x1="32" y1="14" x2="32" y2="22" stroke="#F5A623" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="32" cy="13" r="2.2" fill="#F5A623"/>
  <!-- Eyes -->
  <circle cx="25" cy="31" r="3" fill="#F5A623"/>
  <circle cx="39" cy="31" r="3" fill="#F5A623"/>
  <!-- Mouth / chin bar -->
  <line x1="25" y1="38" x2="39" y2="38" stroke="#F5A623" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="16" y1="31" x2="10" y2="31" stroke="#F5A623" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="48" y1="31" x2="54" y2="31" stroke="#F5A623" stroke-width="2.8" stroke-linecap="round"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
